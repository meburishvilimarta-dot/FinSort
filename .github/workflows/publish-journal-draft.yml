name: Publish Journal draft

on:
  push:
    branches: [main]
    paths:
      - "drafts/*.md"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Publish newest draft to Framer
        env:
          FRAMER_API_KEY: ${{ secrets.FRAMER_API_KEY }}
          FRAMER_PROJECT_URL: ${{ secrets.FRAMER_PROJECT_URL }}
          FRAMER_COLLECTION_NAME: Journal
        run: node scripts/publish-post.mjs

      - name: Commit draft state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drafts
          git diff --cached --quiet || git commit -m "Move published draft to drafts/published"
          git push
