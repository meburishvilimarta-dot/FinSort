name: Check fina2 Framer connection

on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Check Framer connection and print collection fields/items
        # NOTE: reuses the shared FRAMER_API_KEY / FRAMER_PROJECT_URL repo
        # secrets (same ones the root Maison Metekhi pipeline reads), by
        # explicit choice — only one Framer project's credentials can be
        # live in these secrets at a time, so running this disables that
        # pipeline until the secrets are pointed back at its project.
        env:
          FINA2_FRAMER_API_KEY: ${{ secrets.FRAMER_API_KEY }}
          FINA2_FRAMER_PROJECT_URL: ${{ secrets.FRAMER_PROJECT_URL }}
          FINA2_FRAMER_COLLECTION_NAME: Blogs
        run: npm run fina2:check-connection
